{% extends "base.html" %}

{% block title %}Planer potovanja{% endblock %}

{% block content %}
<section class="mx-auto max-w-4xl rounded-lg border border-stone-200 bg-white p-5 shadow-sm">
  <div class="mb-5">
    <h1 class="text-2xl font-semibold tracking-normal text-ink">Sestavi predlog poti</h1>
    <p class="mt-1 text-sm text-stone-600">Vpiši osnovne podatke, aplikacija pa ti pripravi tri cenovno najbolj primerne možnosti.</p>
  </div>

  <form action="{{ url_for('plan') }}" method="post" class="grid gap-5">
    <div class="grid gap-4 md:grid-cols-3">
      <label class="grid gap-2">
        <span class="text-sm font-medium text-stone-700">Število dni</span>
        <input class="rounded-lg border border-stone-300 px-3 py-2 text-base outline-none focus:border-moss focus:ring-2 focus:ring-moss/20" type="number" name="days" min="1" max="30" value="5" required>
      </label>
      <label class="grid gap-2">
        <span class="text-sm font-medium text-stone-700">Število oseb</span>
        <input class="rounded-lg border border-stone-300 px-3 py-2 text-base outline-none focus:border-moss focus:ring-2 focus:ring-moss/20" type="number" name="persons" min="1" max="5" value="2" required>
      </label>
      <label class="grid gap-2">
        <span class="text-sm font-medium text-stone-700">Mesec</span>
        <select class="rounded-lg border border-stone-300 px-3 py-2 text-base outline-none focus:border-moss focus:ring-2 focus:ring-moss/20" name="month">
          {% for value, label in months %}
            <option value="{{ value }}" {% if value == "6" %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </label>
    </div>

    <div class="grid gap-4 md:grid-cols-2">
      <label class="grid gap-2">
        <span class="text-sm font-medium text-stone-700">Kaj želiš delati</span>
        <select class="rounded-lg border border-stone-300 px-3 py-2 text-base outline-none focus:border-moss focus:ring-2 focus:ring-moss/20" name="preference">
          {% for value, label in preferences %}
            <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select>
      </label>
      <label class="grid gap-2">
        <span class="text-sm font-medium text-stone-700">Prehrana</span>
        <select class="rounded-lg border border-stone-300 px-3 py-2 text-base outline-none focus:border-moss focus:ring-2 focus:ring-moss/20" name="food_style">
          {% for value, label in food_styles %}
            <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select>
      </label>
    </div>

    <div class="grid gap-4 md:grid-cols-2">
      <label class="grid gap-2">
        <span class="text-sm font-medium text-stone-700">Pot do destinacije</span>
        <select class="rounded-lg border border-stone-300 px-3 py-2 text-base outline-none focus:border-moss focus:ring-2 focus:ring-moss/20" name="travel_mode">
          {% for value, label in travel_modes %}
            <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select>
      </label>
      <label class="grid gap-2">
        <span class="text-sm font-medium text-stone-700">Prevoz na destinaciji</span>
        <select class="rounded-lg border border-stone-300 px-3 py-2 text-base outline-none focus:border-moss focus:ring-2 focus:ring-moss/20" name="local_transport_mode">
          {% for value, label in local_transport_modes %}
            <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select>
      </label>
    </div>

    <label class="grid gap-2 md:max-w-xs">
      <span class="text-sm font-medium text-stone-700">Proračun</span>
      <input class="rounded-lg border border-stone-300 px-3 py-2 text-base outline-none focus:border-moss focus:ring-2 focus:ring-moss/20" type="number" name="budget_eur" min="1" step="1" placeholder="npr. 1200">
    </label>

    <div class="flex flex-wrap items-center justify-between gap-3 border-t border-stone-200 pt-5">
      <p class="text-sm text-stone-600">Če proračuna ne vpišeš, aplikacija izbere tri najcenejše možnosti.</p>
      <button class="rounded-lg bg-moss px-5 py-3 text-sm font-semibold text-white shadow-sm hover:bg-moss/90" type="submit">
        Prikaži možnosti
      </button>
    </div>
  </form>
</section>
{% endblock %}
