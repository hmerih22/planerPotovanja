{% extends "base.html" %}

{% block title %}Registracija{% endblock %}

{% block content %}
<section class="mx-auto max-w-md rounded-lg border border-stone-200 bg-white p-6 shadow-sm">
  <h1 class="text-2xl font-semibold tracking-normal text-ink">Registracija</h1>
  <form action="{{ url_for('register') }}" method="post" class="mt-6 grid gap-4">
    <label class="grid gap-2">
      <span class="text-sm font-medium text-stone-700">Ime</span>
      <input class="rounded-lg border border-stone-300 px-3 py-2 text-base outline-none focus:border-moss focus:ring-2 focus:ring-moss/20" type="text" name="name" autocomplete="name" required>
    </label>
    <label class="grid gap-2">
      <span class="text-sm font-medium text-stone-700">Email</span>
      <input class="rounded-lg border border-stone-300 px-3 py-2 text-base outline-none focus:border-moss focus:ring-2 focus:ring-moss/20" type="email" name="email" autocomplete="email" required>
    </label>
    <label class="grid gap-2">
      <span class="text-sm font-medium text-stone-700">Geslo</span>
      <input class="rounded-lg border border-stone-300 px-3 py-2 text-base outline-none focus:border-moss focus:ring-2 focus:ring-moss/20" type="password" name="password" autocomplete="new-password" minlength="6" required>
    </label>
    <label class="grid gap-2">
      <span class="text-sm font-medium text-stone-700">Ponovi geslo</span>
      <input class="rounded-lg border border-stone-300 px-3 py-2 text-base outline-none focus:border-moss focus:ring-2 focus:ring-moss/20" type="password" name="password_confirm" autocomplete="new-password" minlength="6" required>
    </label>
    <button class="mt-2 rounded-lg bg-moss px-5 py-3 text-sm font-semibold text-white shadow-sm hover:bg-moss/90" type="submit">
      Ustvari račun
    </button>
  </form>
  <p class="mt-5 text-sm text-stone-600">
    Že imaš račun?
    <a class="font-semibold text-moss hover:text-moss/80" href="{{ url_for('login') }}">Prijava</a>
  </p>
</section>
{% endblock %}
