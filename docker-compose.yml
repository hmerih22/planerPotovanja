services:
  db:
    image: mariadb:11
    container_name: travel_mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_DATABASE: travel_planner
      MARIADB_USER: travel_user
      MARIADB_PASSWORD: travel_password
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  web:
    build: .
    container_name: travel_flask
    restart: always
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: travel_planner
      DB_USER: travel_user
      DB_PASSWORD: travel_password
    depends_on:
      - db

volumes:
  mariadb_data: